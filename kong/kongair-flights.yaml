_format_version: "3.0"
services:
- host: kongair-flights
  id: 0cef4d36-9c39-5ac2-9d9f-190d8ea8a252
  name: flights-service
  path: /
  plugins:
  - name: key-auth
    config:
      key_names:
      - apikey
  - name: rate-limiting
    config:
      minute: 5
      policy: local
  - name: file-log
    config:
      path: "/tmp/logs/file.log"
  port: 8080
  protocol: http
  routes:
  - id: 7b2dbd94-ec5b-5ae8-b6d5-4c8b16ce0b06
    methods:
    - GET
    name: flights-service_get-flights
    paths:
    - ~/api/v1/flights$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /flights
    regex_priority: 200
    strip_path: false
    tags: []
  - id: 3210c3ed-9976-500d-ac03-07eaac972ad0
    methods:
    - GET
    name: flights-service_get-flight-by-number
    paths:
    - ~/api/v1/flights/(?<flightnumber>[^#?/]+)$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /flights/$(uri_captures["flightnumber"])
    regex_priority: 100
    strip_path: false
    tags: []
  - id: 08020aa2-6106-59ec-903a-3459e7cbb629
    methods:
    - GET
    name: flights-service_get-flight-details
    paths:
    - ~/api/v1/flights/(?<flightnumber>[^#?/]+)/details$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /flights/$(uri_captures["flightnumber"])/details
    regex_priority: 100
    strip_path: false
    tags: []
  - id: a5023323-0468-5a77-baf2-13578fec61b0
    methods:
    - GET
    name: flights-service_health_get
    paths:
    - ~/api/v1/flights/health$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /health
    regex_priority: 200
    strip_path: false
    tags: []
  tags: []
upstreams: []
