_format_version: "3.0"
services:
- host: kongair-bookings
  id: 22e1521b-9b91-5d2f-917b-4463066f1aed
  name: bookings-service
  path: /
  plugins:
  - name: key-auth
    config:
      key_names:
      - apikey
  - name: rate-limiting
    config:
      minute: 5
      policy: local
  port: 3000
  protocol: http
  routes:
  - id: 9bd2c85f-5d13-5910-838c-9fad63e8a54d
    methods:
    - GET
    name: bookings-service_get-bookings
    paths:
    - ~/api/v1/bookings$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /bookings
    regex_priority: 200
    strip_path: false
    tags: []
  - id: 4e2f555e-980c-5241-a640-9f0a67ab6693
    methods:
    - POST
    name: bookings-service_post-booking
    paths:
    - ~/api/v1/bookings$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /bookings
    regex_priority: 200
    strip_path: false
    tags: []
  - id: 1a619e4f-651d-550d-ae30-79f4bf45a080
    methods:
    - GET
    name: bookings-service_health_get
    paths:
    - ~/api/v1/bookings/health$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /health
    regex_priority: 200
    strip_path: false
    tags: []
  tags: []
upstreams: []
