_format_version: "3.0"
services:
- host: kongair-customer
  id: 690e812e-2873-566a-b02f-d03e0bf8ff69
  name: customer-information-service
  path: /
  plugins:
  - name: key-auth
    config:
      key_names:
      - apikey
  port: 3000
  protocol: http
  routes:
  - id: 5984bb2d-328e-5785-a06a-f639c3a59d94
    methods:
    - GET
    name: customer-information-service_get-cust-info
    paths:
    - ~/api/v1/customer$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /customer
    regex_priority: 200
    strip_path: false
    tags: []
  - id: 37cbdca9-74d9-51ec-ab8b-008d96f9bd75
    methods:
    - GET
    name: customer-information-service_health_get
    paths:
    - ~/api/v1/customer/health$
    plugins:
    - name: request-transformer
      config:
        replace:
          uri: /health
    regex_priority: 200
    strip_path: false
    tags: []
  tags: []
upstreams: []
